resources:
  jobs:
    financial_signals_daily_pipeline:
      name: financial-signals-daily-pipeline

      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: single_node_cluster
          spark_python_task:
            python_file: ../../notebooks/01_bronze_ingestion_demo.py

        - task_key: silver_transform
          job_cluster_key: single_node_cluster
          depends_on:
            - task_key: bronze_ingestion
          spark_python_task:
            python_file: ../../notebooks/02_silver_transform_demo.py

        - task_key: gold_analytics
          job_cluster_key: single_node_cluster
          depends_on:
            - task_key: silver_transform
          spark_python_task:
            python_file: ../../notebooks/03_gold_analytics_demo.py

        - task_key: validation_queries
          job_cluster_key: single_node_cluster
          depends_on:
            - task_key: gold_analytics
          spark_python_task:
            python_file: ../../notebooks/99_validation_queries.py

      job_clusters:
        - job_cluster_key: single_node_cluster
          new_cluster:
            spark_version: 16.4.x-scala2.12
            node_type_id: Standard_D4ds_v4
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode