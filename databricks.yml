bundle:
  name: financial-signals-lakehouse

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production

variables:
  dev_cluster_id:
    description: Existing cluster used for demos and development, will take 4/5 mins to come up...
    default: "0301-140106-2vpc0rse"

include:
  - resources/**/*.yml
  - notebooks/**/*.yml

sync:
  include:
    - src/**
    - jobs/**
    - notebooks/**
    - sql/**


resources:
  jobs:
    bootstrap_environment:
      name: bootstrap-environment
      tasks:
        - task_key: bootstrap_sql
          spark_python_task:
            python_file: src/bootstrap/bootstrap_env.py
          existing_cluster_id: ${var.dev_cluster_id}




